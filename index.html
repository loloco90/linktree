<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danilo — Links</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Fredoka+One&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; min-height: 100vh;
    font-family: 'Comic Neue', 'Comic Sans MS', cursive;
    position: relative; overflow-x: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  canvas#matrix {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.18; pointer-events: none; z-index: 0;
  }
  .lt-card {
    position: relative; z-index: 10;
    background: rgba(0,0,0,0.85);
    border: 4px solid #7a6a00;
    box-shadow: 6px 6px 0 #6b0000, 10px 10px 0 #00006b;
    border-radius: 6px; padding: 40px 44px 36px;
    max-width: 520px; width: 100%; text-align: center;
  }
  .lt-rainbow-bar {
    height: 12px;
    background: repeating-linear-gradient(90deg,#880000 0px,#880000 16px,#885500 16px,#885500 32px,#887700 32px,#887700 48px,#005500 48px,#005500 64px,#000077 64px,#000077 80px,#440077 80px,#440077 96px);
    margin-bottom: 24px; border-radius: 2px;
  }
  .lt-avatar {
    width: 100px; height: 100px; border-radius: 50%;
    border: 4px solid #7a6a00; box-shadow: 3px 3px 0 #6b0000;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px; overflow: hidden;
  }
  .lt-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .lt-name {
    font-family: 'Fredoka One', cursive; font-size: 2.5em;
    color: #ccaa00; text-shadow: 2px 2px 0 #6b0000, 4px 4px 0 #00006b;
    margin-bottom: 6px;
  }
  .lt-bio { color: #888; font-size: 1.1em; margin-bottom: 24px; font-style: italic; }
  .lt-links { display: flex; flex-direction: column; gap: 14px; }
  .lt-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 22px; border-radius: 4px; border: 3px solid;
    font-family: 'Comic Neue', cursive; font-weight: 700; font-size: 1.2em;
    cursor: pointer; text-decoration: none; transition: transform 0.1s; width: 100%;
  }
  .lt-btn:hover { transform: scale(1.04) translateY(-2px); }
  .lt-btn:active { transform: scale(0.97) translateY(1px); }
  .lt-btn-icon { font-size: 1.4em; width: 32px; text-align: center; flex-shrink: 0; display: inline-block; }
  .lt-btn-label { flex: 1; text-align: left; }
  .lt-btn-arrow { font-size: 0.9em; opacity: 0.5; }
  .btn-instagram { background: #110020; border-color: #882288; color: #cc88cc; box-shadow: 3px 3px 0 #440033; }
  .btn-github { background: #0d0d0d; border-color: #888888; color: #cccccc; box-shadow: 3px 3px 0 #333; }
  .btn-linkedin { background: #001128; border-color: #006699; color: #66aacc; box-shadow: 3px 3px 0 #002244; }
  .btn-projects { background: #111000; border-color: #7a6a00; color: #ccaa00; box-shadow: 3px 3px 0 #443300; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes floatIcon { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-5px) rotate(5deg)} }
  @keyframes wave { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .icon-bounce { animation: bounce 1.4s ease-in-out infinite; }
  .icon-float { animation: floatIcon 2s ease-in-out infinite; }
  .icon-wave { animation: wave 1.2s ease-in-out infinite; }
  .icon-spin { animation: spin 4s linear infinite; }
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center;
  }
  .overlay.active { display: flex; }
  .popup {
    background: #000; border-radius: 6px;
    padding: 32px 34px; max-width: 440px; width: 92%;
    text-align: center; position: relative;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
  .popup-close {
    position: absolute; top: 8px; right: 12px;
    background: none; border: none;
    font-size: 1.4em; cursor: pointer; font-weight: 700;
    font-family: 'Comic Neue', cursive;
  }
  .popup-close:hover { color: #fff; }
  .popup-bar { height: 9px; margin-bottom: 20px; border-radius: 2px; }
  .popup h3 { font-family: 'Fredoka One', cursive; font-size: 1.6em; margin-bottom: 6px; }
  .popup p { font-size: 0.9em; margin-bottom: 20px; font-style: italic; color: #888; }
  #igPopup { border: 4px solid #882288; box-shadow: 6px 6px 0 #440077, 10px 10px 0 #6b0000; }
  #igPopup .popup-bar { background: repeating-linear-gradient(90deg,#882288 0,#882288 16px,#440077 16px,#440077 32px,#880044 32px,#880044 48px); }
  #igPopup h3 { color: #cc88cc; text-shadow: 2px 2px 0 #440077; }
  #igPopup .popup-close { color: #882288; }
  .ig-options { display: flex; flex-direction: column; gap: 12px; }
  .ig-opt {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 18px; border-radius: 4px; border: 3px solid;
    font-family: 'Comic Neue', cursive; font-weight: 700; font-size: 1.05em;
    cursor: pointer; text-decoration: none; transition: transform 0.1s; white-space: nowrap;
  }
  .ig-opt:hover { transform: scale(1.04); }
  .ig-opt-pessoal { background: #110020; border-color: #882288; color: #cc88cc; box-shadow: 3px 3px 0 #440033; }
  .ig-opt-prof { background: #0a0015; border-color: #662266; color: #bb88ee; box-shadow: 3px 3px 0 #330055; }
  .ig-opt-icon { font-size: 1.3em; flex-shrink: 0; }
  #projPopup { border: 4px solid #7a6a00; box-shadow: 6px 6px 0 #443300, 10px 10px 0 #6b0000; }
  #projPopup .popup-bar { background: repeating-linear-gradient(90deg,#7a6a00 0,#7a6a00 16px,#443300 16px,#443300 32px,#885500 32px,#885500 48px); }
  #projPopup h3 { color: #ccaa00; text-shadow: 2px 2px 0 #443300; }
  #projPopup .popup-close { color: #7a6a00; }
  .proj-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
  .proj-row { display: flex; gap: 10px; }
  .proj-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 10px; border-radius: 4px; border: 3px solid #7a6a00;
    background: #111000; color: #ccaa00; box-shadow: 3px 3px 0 #443300;
    font-family: 'Comic Neue', cursive; font-weight: 700; font-size: 0.95em;
    cursor: pointer; text-decoration: none; transition: transform 0.1s; text-align: center;
  }
  .proj-btn:hover { transform: scale(1.05) translateY(-2px); }
  .proj-btn .proj-icon { font-size: 1.6em; display: inline-block; animation: bounce 1.4s ease-in-out infinite; }
  .proj-btn .proj-label { font-size: 0.9em; }
  .proj-construcao {
    border: 3px dashed #7a6a00; border-radius: 6px;
    padding: 20px 20px; color: #887700;
    font-size: 1.1em; font-weight: 700; letter-spacing: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .blink { animation: blink 1.2s infinite; }
  .lt-ticker { margin-top: 24px; border-top: 3px solid #7a6a00; padding-top: 8px; overflow: hidden; }
  .lt-ticker-inner {
    display: inline-block; white-space: nowrap;
    animation: ltmarquee 14s linear infinite;
    color: #ccaa00; font-size: 0.9em; font-weight: 700; letter-spacing: 1px;
  }
  @keyframes ltmarquee { from{transform:translateX(100%)} to{transform:translateX(-100%)} }
  .lt-stars { position: absolute; top: 10px; right: 12px; font-size: 1.2em; animation: ltblink 1.4s infinite; color: #ccaa00; }
  @keyframes ltblink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @media (max-width: 480px) {
    .lt-card { padding: 28px 18px 24px; }
    .lt-name { font-size: 2em; }
    .lt-btn { font-size: 1.05em; padding: 13px 14px; }
    .popup { padding: 24px 16px; }
    .ig-opt { font-size: 0.95em; padding: 11px 12px; }
  }
</style>
</head>

<script>
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF@#$%&<>/\\|';
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const fontSize = 14;
  let drops = [];
  function initDrops() {
    const cols = Math.floor(canvas.width / fontSize);
    drops = Array(cols).fill(1);
  }
  initDrops();
  window.addEventListener('resize', initDrops);
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const char = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = i % 3 === 0 ? '#FFD700' : i % 3 === 1 ? '#FF00FF' : '#00FFFF';
      ctx.fillText(char, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 50);
</script>
